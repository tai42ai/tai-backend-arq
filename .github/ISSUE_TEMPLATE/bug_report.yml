name: Bug report
description: Report a defect in tai42-backend-arq (the arq execution backend)
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or code that reproduce the problem.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tai42-backend-arq version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, the host tai42-skeleton version, the arq and redis versions, and the Redis URL scheme.
      placeholder: "Python 3.13.x, macOS 15"
    validations:
      required: true
